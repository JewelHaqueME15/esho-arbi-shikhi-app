<!DOCTYPE html>
<html lang="bn" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>এসো আরবি শিখি — গেম</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#58cc02; --green-d:#46a302; --blue:#1cb0f6; --blue-d:#1899d6;
  --red:#ff4b4b; --gold:#ffc800; --purple:#ce82ff; --orange:#ff9600;
  --bg:#fff; --ink:#3c3c3c; --gray:#afafaf; --line:#e5e5e5; --soft:#f7f7f7;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans Bengali','Hind Siliguri',sans-serif;background:var(--bg);color:var(--ink);max-width:520px;margin:0 auto;min-height:100vh;position:relative;user-select:none}
.ar{font-family:'Noto Naskh Arabic','Traditional Arabic',serif;direction:rtl}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.screen{display:none;padding-bottom:90px}
.screen.active{display:block}
/* top bar */
#topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;position:sticky;top:0;background:var(--bg);z-index:20;border-bottom:2px solid var(--line)}
.stat{display:flex;align-items:center;gap:5px;font-weight:700;font-size:17px}
.stat .ico{font-size:20px}
.stat.streak{color:var(--orange)} .stat.gems{color:var(--blue)} .stat.hearts{color:var(--red)}
/* skill tree */
#path{padding:20px 0 30px}
.unit-head{margin:18px 16px 6px;background:var(--green);border-radius:16px;padding:14px 18px;color:#fff;box-shadow:0 4px 0 var(--green-d)}
.unit-head h2{font-size:18px;font-weight:800}
.unit-head p{font-size:13.5px;opacity:.92;margin-top:2px}
.node-row{display:flex;justify-content:center;margin:18px 0}
.node{width:74px;height:74px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;box-shadow:0 6px 0 rgba(0,0,0,.18);transition:transform .1s}
.node:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.18)}
.node.done{background:var(--gold);box-shadow:0 6px 0 #d4a600}
.node.avail{background:var(--green);box-shadow:0 6px 0 var(--green-d);animation:pulse 2s infinite}
.node.locked{background:#e5e5e5;box-shadow:0 6px 0 #cfcfcf;filter:grayscale(1);opacity:.75}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.crowns{position:absolute;bottom:-8px;right:-8px;background:#fff;border:2px solid var(--line);border-radius:12px;font-size:12px;font-weight:800;padding:1px 7px;color:#d4a600}
.node-label{text-align:center;font-size:13px;font-weight:700;margin-top:10px;color:var(--ink);max-width:110px}
.node-wrap{display:flex;flex-direction:column;align-items:center}
.offset-l{transform:translateX(-70px)} .offset-r{transform:translateX(70px)}
/* tabbar */
#tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:#fff;border-top:2px solid var(--line);display:flex;z-index:30}
#tabbar button{flex:1;padding:10px 0 12px;font-size:24px;opacity:.45;display:flex;flex-direction:column;align-items:center;gap:2px}
#tabbar button span{font-size:11px;font-weight:700}
#tabbar button.on{opacity:1}
/* lesson */
#lesson-top{display:flex;align-items:center;gap:12px;padding:14px 16px}
#lesson-top .quit{font-size:22px;color:var(--gray);font-weight:800}
#pbar{flex:1;height:16px;background:var(--line);border-radius:9px;overflow:hidden}
#pbar>div{height:100%;width:0%;background:var(--green);border-radius:9px;transition:width .3s}
#lesson-hearts{color:var(--red);font-weight:800;font-size:16px}
#ex-area{padding:8px 20px 20px}
.ex-title{font-size:19px;font-weight:800;margin:10px 0 18px}
.big-ar{font-size:44px;text-align:center;margin:8px 0 22px;line-height:1.9}
.big-bn{font-size:26px;text-align:center;margin:8px 0 22px;font-weight:700}
.speak-btn{display:inline-flex;align-items:center;justify-content:center;background:var(--blue);color:#fff;width:52px;height:52px;border-radius:14px;font-size:24px;box-shadow:0 4px 0 var(--blue-d);vertical-align:middle}
.speak-btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--blue-d)}
.speak-row{display:flex;justify-content:center;gap:14px;align-items:center;margin:10px 0 24px}
.opts{display:flex;flex-direction:column;gap:12px}
.opts.grid2{display:grid;grid-template-columns:1fr 1fr}
.opt{border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;padding:14px;font-size:19px;font-weight:600;text-align:center;background:#fff;transition:.12s}
.opt .ar{font-size:26px}
.opt.sel{border-color:var(--blue);background:#e7f6ff;color:var(--blue-d)}
.opt.ok{border-color:var(--green);background:#e9ffd9;color:var(--green-d)}
.opt.bad{border-color:var(--red);background:#ffe5e5;color:var(--red)}
.opt.faded{opacity:.35;pointer-events:none}
/* match */
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* build */
#build-answer{min-height:64px;border-top:2px solid var(--line);border-bottom:2px solid var(--line);margin-bottom:20px;padding:10px 4px;display:flex;flex-wrap:wrap;gap:8px;direction:rtl}
#build-bank{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;direction:rtl}
.tile{border:2px solid var(--line);border-bottom-width:4px;border-radius:12px;padding:8px 16px;font-size:24px;background:#fff}
.tile.used{opacity:.3;pointer-events:none}
/* footer check */
#check-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;padding:16px 20px 22px;background:#fff;border-top:2px solid var(--line);z-index:40}
#check-bar.ok{background:#d7ffb8;border-color:#d7ffb8}
#check-bar.bad{background:#ffdfe0;border-color:#ffdfe0}
#fb-text{font-weight:800;font-size:17px;margin-bottom:10px;display:none}
#check-bar.ok #fb-text{display:block;color:var(--green-d)}
#check-bar.bad #fb-text{display:block;color:var(--red)}
.btn{display:block;width:100%;padding:14px;border-radius:14px;font-size:17px;font-weight:800;letter-spacing:.5px;color:#fff;background:var(--green);box-shadow:0 4px 0 var(--green-d);text-align:center}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--green-d)}
.btn:disabled{background:var(--line);box-shadow:0 4px 0 #d5d5d5;color:var(--gray)}
.btn.red{background:var(--red);box-shadow:0 4px 0 #d33}
.btn.blue{background:var(--blue);box-shadow:0 4px 0 var(--blue-d)}
.btn.ghost{background:#fff;color:var(--blue);border:2px solid var(--line);box-shadow:0 4px 0 var(--line)}
/* results */
.result-wrap{text-align:center;padding:60px 24px}
.result-wrap .emo{font-size:80px}
.result-wrap h1{font-size:26px;margin:14px 0 8px;font-weight:800}
.result-cards{display:flex;gap:12px;justify-content:center;margin:26px 0}
.rcard{border:2px solid;border-radius:14px;min-width:96px;overflow:hidden}
.rcard .top{font-size:12px;font-weight:800;color:#fff;padding:4px}
.rcard .val{font-size:22px;font-weight:800;padding:10px;background:#fff}
/* profile / misc */
.section{padding:18px 20px}
.section h2{font-size:20px;font-weight:800;margin-bottom:12px}
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.badge{border:2px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center}
.badge .emo{font-size:34px}
.badge .nm{font-size:12.5px;font-weight:700;margin-top:6px}
.badge.off{filter:grayscale(1);opacity:.45}
.lb-row{display:flex;align-items:center;gap:12px;padding:11px 6px;border-bottom:1px solid var(--line);font-weight:600}
.lb-row .rank{width:26px;font-weight:800;color:var(--gray)}
.lb-row.me{background:#fff8e0;border-radius:10px}
.lb-row .xps{margin-left:auto;color:var(--gray);font-weight:700}
.word-row{display:flex;align-items:center;gap:12px;padding:10px 6px;border-bottom:1px solid var(--line)}
.word-row .ar{font-size:26px;min-width:110px}
.word-row .bn{color:var(--gray);font-weight:600}
.word-row button{margin-left:auto;font-size:22px}
.tipbox{background:var(--soft);border:2px solid var(--line);border-radius:14px;padding:14px;margin:12px 0;font-size:15px;line-height:1.7}
.tipbox .ar{font-size:22px}
.profile-head{text-align:center;padding:26px 0 8px}
.profile-head .av{font-size:64px}
.profile-head h1{font-size:22px;font-weight:800}
.profile-head p{color:var(--gray);font-weight:600;font-size:14px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.scard{border:2px solid var(--line);border-radius:14px;padding:12px;display:flex;gap:10px;align-items:center}
.scard .ic{font-size:26px}
.scard .v{font-weight:800;font-size:18px}
.scard .l{font-size:12px;color:var(--gray);font-weight:700}
/* modal */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;display:none;align-items:center;justify-content:center;padding:24px}
#modal.show{display:flex}
#modal .box{background:#fff;border-radius:20px;padding:26px 22px;max-width:380px;width:100%;text-align:center}
#modal .box .emo{font-size:64px}
#modal .box h2{font-size:20px;font-weight:800;margin:10px 0 6px}
#modal .box p{color:var(--gray);font-weight:600;font-size:14.5px;margin-bottom:16px;line-height:1.6}
.xp-float{position:fixed;left:50%;top:40%;transform:translateX(-50%);font-size:28px;font-weight:800;color:var(--gold);z-index:70;pointer-events:none;animation:rise 1.1s forwards}
@keyframes rise{0%{opacity:0;translate:0 20px}25%{opacity:1}100%{opacity:0;translate:0 -60px}}
</style>
</head>
<body>
<!-- ═══ HOME ═══ -->
<div id="topbar">
  <div class="stat streak"><span class="ico">🔥</span><span id="st-streak">0</span></div>
  <div class="stat gems"><span class="ico">💎</span><span id="st-gems">0</span></div>
  <div class="stat hearts"><span class="ico">❤️</span><span id="st-hearts">5</span></div>
</div>

<div id="scr-home" class="screen active"><div id="path"></div></div>

<!-- ═══ LESSON ═══ -->
<div id="scr-lesson" class="screen">
  <div id="lesson-top">
    <button class="quit" onclick="quitLesson()">✕</button>
    <div id="pbar"><div></div></div>
    <div id="lesson-hearts">❤️5</div>
  </div>
  <div id="ex-area"></div>
  <div id="check-bar">
    <div id="fb-text"></div>
    <button id="btn-check" class="btn" disabled>যাচাই করো</button>
  </div>
</div>

<!-- ═══ RESULT ═══ -->
<div id="scr-result" class="screen"></div>

<!-- ═══ WORDS ═══ -->
<div id="scr-words" class="screen">
  <div class="section"><h2>📖 শব্দভাণ্ডার</h2>
  <p style="color:var(--gray);font-weight:600;font-size:14px;margin-bottom:10px">তোমার অর্জিত শব্দগুলো — 🔊 চাপলে উচ্চারণ শুনবে</p>
  <div id="word-list"></div></div>
</div>

<!-- ═══ LEAGUE ═══ -->
<div id="scr-league" class="screen">
  <div class="section"><h2>🏆 সাপ্তাহিক লিগ</h2>
  <p style="color:var(--gray);font-weight:600;font-size:14px;margin-bottom:10px">XP অর্জন করে তালিকার শীর্ষে ওঠো!</p>
  <div id="lb-list"></div></div>
</div>

<!-- ═══ PROFILE ═══ -->
<div id="scr-profile" class="screen">
  <div class="profile-head">
    <div class="av" id="pf-av">🌱</div>
    <h1 id="pf-title">নবীন তালিবে ইলম</h1>
    <p id="pf-sub">লেভেল ১</p>
  </div>
  <div class="section">
    <div class="stat-grid">
      <div class="scard"><div class="ic">⚡</div><div><div class="v" id="pf-xp">0</div><div class="l">মোট XP</div></div></div>
      <div class="scard"><div class="ic">🔥</div><div><div class="v" id="pf-streak">0</div><div class="l">দিনের ধারা</div></div></div>
      <div class="scard"><div class="ic">👑</div><div><div class="v" id="pf-crowns">0</div><div class="l">মুকুট</div></div></div>
      <div class="scard"><div class="ic">📚</div><div><div class="v" id="pf-words">0</div><div class="l">শেখা শব্দ</div></div></div>
    </div>
  </div>
  <div class="section"><h2>🎖️ অর্জনসমূহ</h2><div class="badge-grid" id="badge-grid"></div></div>
  <div class="section"><button class="btn red" onclick="resetAll()">সব প্রগ্রেস মুছে ফেলো</button></div>
</div>

<div id="tabbar">
  <button id="tab-home" class="on" onclick="showTab('home')">🏠<span>শেখা</span></button>
  <button id="tab-words" onclick="showTab('words')">📖<span>শব্দ</span></button>
  <button id="tab-league" onclick="showTab('league')">🏆<span>লিগ</span></button>
  <button id="tab-profile" onclick="showTab('profile')">👤<span>প্রোফাইল</span></button>
</div>

<div id="modal"><div class="box" id="modal-box"></div></div>
<script>
/* ════════ বইয়ের বিষয়বস্তু: এসো আরবি শিখি (১ম খণ্ড, ১ম অধ্যায়) ════════ */
const UNITS=[
{id:0,icon:"🏠",title:"পাঠ ১ক — হাজা ও জালিকা",sub:"هٰذا / ذٰلِكَ — ইহা ও উহা (পুংলিঙ্গ)",
 tip:"<b>هٰذا</b> = ইহা (কাছের জিনিস) · <b>ذٰلِكَ</b> = উহা (দূরের জিনিস)।<br>যেমন: <span class='ar'>هٰذا كِتابٌ</span> — ইহা একটি বই। <span class='ar'>ذٰلِكَ قَلَمٌ</span> — উহা একটি কলম।",
 vocab:[{a:"كِتابٌ",b:"একটি বই"},{a:"قَلَمٌ",b:"একটি কলম"},{a:"كُرْسِيٌّ",b:"একটি চেয়ার"},{a:"بَيْتٌ",b:"একটি ঘর"},{a:"بابٌ",b:"একটি দরজা"},{a:"مِصْباحٌ",b:"একটি বাতি"},{a:"جِدارٌ",b:"একটি দেয়াল"},{a:"سَرِيرٌ",b:"একটি খাট"},{a:"مَسْجِدٌ",b:"একটি মসজিদ"}],
 sents:[{a:"هٰذا كِتابٌ",b:"ইহা একটি বই"},{a:"ذٰلِكَ قَلَمٌ",b:"উহা একটি কলম"},{a:"هٰذا مَسْجِدٌ",b:"ইহা একটি মসজিদ"},{a:"ذٰلِكَ بَيْتٌ",b:"উহা একটি ঘর"},{a:"هٰذا بابٌ",b:"ইহা একটি দরজা"},{a:"ذٰلِكَ مِصْباحٌ",b:"উহা একটি বাতি"},{a:"هٰذا جِدارٌ",b:"ইহা একটি দেয়াল"},{a:"ذٰلِكَ سَرِيرٌ",b:"উহা একটি খাট"}]},

{id:1,icon:"🏫",title:"পাঠ ১খ — হাজিহি ও তিলকা",sub:"هٰذِهِ / تِلْكَ + ما — স্ত্রীলিঙ্গ ও প্রশ্ন",
 tip:"স্ত্রীলিঙ্গ শব্দের জন্য <b>هٰذِهِ</b> (ইহা) ও <b>تِلْكَ</b> (উহা)।<br>প্রশ্ন: <span class='ar'>ما هٰذا؟</span> — ইহা কী? <span class='ar'>ما تِلْكَ؟</span> — উহা কী?",
 vocab:[{a:"مَدْرَسَةٌ",b:"একটি মাদরাসা"},{a:"سَبُّورَةٌ",b:"একটি ব্ল্যাকবোর্ড"},{a:"مِسْطَرَةٌ",b:"একটি রুলার"},{a:"حَقِيبَةٌ",b:"একটি ব্যাগ"},{a:"كُرَّاسَةٌ",b:"একটি খাতা"},{a:"طاوِلَةٌ",b:"একটি টেবিল"},{a:"حُجْرَةٌ",b:"একটি কামরা"},{a:"نافِذَةٌ",b:"একটি জানালা"},{a:"قُفْلٌ",b:"একটি তালা"},{a:"مِفْتاحٌ",b:"একটি চাবি"},{a:"صُنْدُوقٌ",b:"একটি বাক্স"},{a:"ساعَةٌ",b:"একটি ঘড়ি"},{a:"مِظَلَّةٌ",b:"একটি ছাতা"},{a:"نَظّارَةٌ",b:"একটি চশমা"},{a:"سَيّارَةٌ",b:"একটি গাড়ি"},{a:"دَرّاجَةٌ",b:"একটি সাইকেল"}],
 sents:[{a:"هٰذِهِ مَدْرَسَةٌ",b:"ইহা একটি মাদরাসা"},{a:"تِلْكَ سَبُّورَةٌ",b:"উহা একটি ব্ল্যাকবোর্ড"},{a:"هٰذِهِ حَقِيبَةٌ",b:"ইহা একটি ব্যাগ"},{a:"تِلْكَ نافِذَةٌ",b:"উহা একটি জানালা"},{a:"ما هٰذا؟",b:"ইহা কী?"},{a:"ما تِلْكَ؟",b:"উহা কী?"},{a:"هٰذِهِ ساعَةٌ",b:"ইহা একটি ঘড়ি"},{a:"تِلْكَ سَيّارَةٌ",b:"উহা একটি গাড়ি"}]},

{id:24,icon:"🕋",title:"পাঠ ২৫ — সৃষ্টি ও ইবাদত",sub:"خَلَقَ، سَجَدَ + আমাকে-তোমাকে-তাকে",

let S=load();
function load(){try{const j=JSON.parse(localStorage.getItem("eas_state"));return Object.assign({},DEF,j||{})}catch(e){return{...DEF}}}
function save(){localStorage.setItem("eas_state",JSON.stringify(S))}
function totalCrowns(s){return Object.values(s.crowns).reduce((a,b)=>a+b,0)}
function today(){return new Date().toISOString().slice(0,10)}
function dailyRefresh(){
  const t=today();
  if(S.heartDay!==t){S.hearts=5;S.heartDay=t}
  if(S.goalDay!==t){S.dayXP=0;S.goalDay=t}
  if(S.lastDay&&S.lastDay!==t){
    const d1=new Date(S.lastDay),d2=new Date(t);
    if((d2-d1)/864e5>1){S.streak=0} // ধারা ভেঙে গেছে
  }
  save()
}
function bumpStreak(){
  const t=today();
  if(S.lastDay!==t){
    const prev=S.lastDay;S.lastDay=t;
    if(prev&&(new Date(t)-new Date(prev))/864e5===1)S.streak++;else S.streak=1;
    if(S.streak>S.bestStreak)S.bestStreak=S.streak;
  }
  save()
}

let AC=null;
function ac(){try{if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();if(AC.state==="suspended")AC.resume();return AC}catch(e){return null}}
function tone(f,t0,dur,type,vol){const c=ac();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type=type||"sine";o.frequency.value=f;o.connect(g);g.connect(c.destination);const t=c.currentTime+t0;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||.22,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.start(t);o.stop(t+dur+.05)}

function arVoice(){if(!("speechSynthesis" in window))return null;const vs=speechSynthesis.getVoices();return vs.find(v=>v.lang&&v.lang.toLowerCase().startsWith("ar"))||vs.find(v=>/arab/i.test(v.name))||null}

/* ধাপ ১: অনলাইন উচ্চারণ (Google TTS) — যেকোনো ব্রাউজারে কাজ করে */
function speak(txt){
  lastSpeakTxt=txt;
  if(curAudio){try{curAudio.pause()}catch(e){}curAudio=null}
  if("speechSynthesis" in window)speechSynthesis.cancel();
  if(navigator.onLine!==false){
    const a=new Audio("https://translate.google.com/translate_tts?ie=UTF-8&tl=ar&client=tw-ob&q="+encodeURIComponent(txt));
    curAudio=a;a.volume=1;
    let fell=false;const fall=()=>{if(!fell){fell=true;ttsSpeak(txt)}};
    a.onerror=fall;
    const pr=a.play();if(pr&&pr.catch)pr.catch(fall);
  }else{ttsSpeak(txt)}
}
/* ধাপ ২: ডিভাইসের নিজস্ব ভয়েস (ফলব্যাক) */
function ttsSpeak(txt,tries){
  if(!("speechSynthesis" in window))return;
  tries=tries||0;
  const vs=speechSynthesis.getVoices();
  if(!vs.length&&tries<6){setTimeout(()=>ttsSpeak(txt,tries+1),250);return}
  speechSynthesis.cancel();
  /* Chrome বাগ: cancel-এর পরপরই speak দিলে নীরব থাকে — সামান্য বিরতি দরকার */
  setTimeout(()=>{
    const u=new SpeechSynthesisUtterance(txt);
    window.__keepUtter=u; /* Chrome GC বাগ: রেফারেন্স না রাখলে মাঝপথে থেমে যায় */
    u.lang="ar-SA";u.rate=.8;u.pitch=1;u.volume=1;

let L=null; // চলমান পাঠ
function genExercises(ui){
  const u=UNITS[ui],ex=[];
  const vocab=shuffle(u.vocab).slice(0,8);
  const allV=UNITS.slice(0,ui+1).flatMap(x=>x.vocab);
  vocab.slice(0,3).forEach(w=>ex.push({t:"mc_ab",w,opts:shuffle([w.b,...pick(allV.map(v=>v.b),3,w.b)])}));
  vocab.slice(3,5).forEach(w=>ex.push({t:"mc_ba",w,opts:shuffle([w.a,...pick(allV.map(v=>v.a),3,w.a)])}));
  vocab.slice(5,7).forEach(w=>ex.push({t:"listen",w,opts:shuffle([w.a,...pick(allV.map(v=>v.a),3,w.a)])}));
  ex.push({t:"match",pairs:shuffle(u.vocab).slice(0,4)});
  shuffle(u.sents).slice(0,2).forEach(s=>ex.push({t:"build",s}));
  shuffle(u.sents).slice(0,2).forEach(s=>ex.push({t:"tr",s,opts:shuffle([s.b,...pick(u.sents.map(x=>x.b),3,s.b)])}));
  if(u.qa)shuffle(u.qa).slice(0,2).forEach(item=>ex.push({t:"qa",q:item.q,opts:shuffle(item.o.slice()),ans:item.o[item.c]}));
  if(u.fill)shuffle(u.fill).slice(0,2).forEach(item=>ex.push({t:"fill",q:item.q,opts:shuffle(item.o.slice()),ans:item.o[item.c]}));
  return shuffle(ex);
}
/* রিভিউ: শেখা শব্দ থেকে মিশ্র অনুশীলন */
function genReviewExercises(ws){
  const ex=[],pool=shuffle(ws);
  const take=Math.min(10,pool.length);
  for(let i=0;i<take;i++){
    const w=pool[i],r=i%3;
    if(r===0)ex.push({t:"mc_ab",w,opts:shuffle([w.b,...pick(ws.map(v=>v.b),3,w.b)])});
    else if(r===1)ex.push({t:"mc_ba",w,opts:shuffle([w.a,...pick(ws.map(v=>v.a),3,w.a)])});
    else ex.push({t:"listen",w,opts:shuffle([w.a,...pick(ws.map(v=>v.a),3,w.a)])});
  }
  if(ws.length>=4)ex.push({t:"match",pairs:shuffle(ws).slice(0,4)});
  return shuffle(ex);
}

/* ── ইন্টার‌্যাকশন ── */
function selOpt(el,val){
  document.querySelectorAll(".opt").forEach(o=>o.classList.remove("sel"));
  el.classList.add("sel");L.sel=val;$("#btn-check").disabled=false;
}
function tapMatch(el){
  const e=L.ex[L.i];
  if(el.classList.contains("faded"))return;
  if(L.matchSel&&L.matchSel.dataset.side===el.dataset.side){L.matchSel.classList.remove("sel");L.matchSel=el;el.classList.add("sel");return}
  if(!L.matchSel){L.matchSel=el;el.classList.add("sel");if(el.dataset.side==="a")speak(el.dataset.v);return}
  const a=L.matchSel.dataset.side==="a"?L.matchSel:el, b=L.matchSel.dataset.side==="a"?el:L.matchSel;
  const good=e.pairs.some(p=>p.a===a.dataset.v&&p.b===b.dataset.v);
  if(good){sndPair();[a,b].forEach(x=>{x.classList.remove("sel");x.classList.add("ok");setTimeout(()=>x.classList.add("faded"),350)});
    L.matchDone++;if(a.dataset.side==="a")speak(a.dataset.v);
    L.correctWords.add(a.dataset.v);if(L.matchDone===e.pairs.length){$("#btn-check").disabled=false;$("#btn-check").textContent="চালিয়ে যাও";feedback(true,"চমৎকার জোড়া!");L.autoOk=true}}
  else{sndBad();[a,b].forEach(x=>{x.classList.add("bad");setTimeout(()=>x.classList.remove("bad","sel"),600)});
    loseHeart();if(S.hearts<=0){outOfHearts();return}}
  L.matchSel=null;
}
function tapTile(el){
  if(el.classList.contains("used"))return;
  el.classList.add("used");L.built.push(el.dataset.w);
  const chip=document.createElement("button");chip.className="tile";chip.innerHTML=`<span class="ar">${el.dataset.w}</span>`;
  chip.onclick=()=>{L.built.splice(L.built.indexOf(el.dataset.w),1);chip.remove();el.classList.remove("used");$("#btn-check").disabled=L.built.length===0};
  $("#build-answer").appendChild(chip);
  $("#btn-check").disabled=false;
}
/* ── যাচাই ── */
function checkAnswer(){
  const e=L.ex[L.i];
  if(L.autoOk){L.autoOk=false;next(true);return}
  let good=false,correctTxt="";
  if(e.t==="mc_ab"){good=L.sel===e.w.b;correctTxt=e.w.b}
  else if(e.t==="mc_ba"||e.t==="listen"){good=L.sel===e.w.a;correctTxt=e.w.a}
  else if(e.t==="build"){good=L.built.join(" ")===e.s.a;correctTxt=e.s.a}
  else if(e.t==="tr"){good=L.sel===e.s.b;correctTxt=e.s.b}
  else if(e.t==="qa"||e.t==="fill"){good=L.sel===e.ans;correctTxt=e.ans}
  document.querySelectorAll(".opt").forEach(o=>{
    const v=o.dataset.v||o.textContent.trim();
    if(o.classList.contains("sel"))o.classList.add(good?"ok":"bad");
  });
  if(good){
    if(e.w)L.correctWords.add(e.w.a);
    const sp=e.w?e.w.a:(e.s?e.s.a:(e.ans&&/[؀-ۿ]/.test(e.ans)?e.ans:null));
    feedback(true,praise());if(sp)speak(sp);
    $("#btn-check").textContent="চালিয়ে যাও";$("#btn-check").onclick=()=>next(true);
  }else{
    L.wrong++;loseHeart();
    if(S.hearts<=0){outOfHearts();return}
    feedback(false,"সঠিক উত্তর: "+correctTxt);
    $("#btn-check").textContent="বুঝেছি";$("#btn-check").onclick=()=>next(false);
  }
}

function loseHeart(){S.hearts=Math.max(0,S.hearts-1);save();setProgress();updateTop()}
function outOfHearts(){
  modal(`<div class="emo">💔</div><h2>হৃদয় শেষ!</h2><p>ভুল হলে হৃদয় কমে — এটাই খেলার নিয়ম। আগামীকাল আবার ভরে যাবে, অথবা ৩০💎 দিয়ে ভরে নাও।</p>`,
   `<button class="btn blue" onclick="buyHearts();if(S.hearts>0){renderEx()}">💎 ৩০ দিয়ে ভরো</button><div style="height:10px"></div><button class="btn ghost" onclick="closeModal();showTab('home')">বাড়ি ফিরে যাও</button>`);
}
function next(wasOk){
  const cb=$("#btn-check");cb.classList.remove("red");
  L.i++;
  if(L.i>=L.ex.length)finishLesson();else renderEx();
}
/* ── সমাপ্তি ── */
function finishLesson(){
  speechSynthesis.cancel();
  const perfect=L.wrong===0;
  let xp=L.review?L.ex.length*5+(perfect?10:0):L.ex.length*10+(perfect?20:0);
  let gems=L.review?2+Math.floor(Math.random()*4):5+Math.floor(Math.random()*6);
  const hadGoal=S.dayXP>=S.goal;
  S.xp+=xp;S.gems+=gems;S.dayXP+=xp;S.lessonsDone++;if(perfect)S.perfect++;
  if(!L.review){
    S.crowns[L.ui]=Math.min(3,(S.crowns[L.ui]||0)+1);
    L.correctWords.forEach(w=>{const v=UNITS[L.ui].vocab.find(x=>x.a===w);if(v)S.words[w]=v.b});
    UNITS[L.ui].vocab.forEach(v=>{if(Math.random()<.4)S.words[v.a]=v.b});
  }
  if(!hadGoal&&S.dayXP>=S.goal)xpFloat("🎯 দৈনিক লক্ষ্য!");
  bumpStreak();S.chestCount++;
  const newBadges=BADGES.filter(b=>!S.badges[b.id]&&b.chk(S));
  newBadges.forEach(b=>S.badges[b.id]=true);
  save();updateTop();
  $("#scr-lesson").classList.remove("active");
  const R=$("#scr-result");R.classList.add("active");
  R.innerHTML=`<div class="result-wrap">
    <div class="emo">${perfect?"🌟":"🎉"}</div>
    <h1>${perfect?"নিখুঁত পাঠ! মাশাআল্লাহ!":"পাঠ সম্পূর্ণ!"}</h1>
    <p style="color:var(--gray);font-weight:600">${L.review?"🔁 শব্দ অনুশীলন":UNITS[L.ui].title+" · মুকুট "+S.crowns[L.ui]+"/৩"}</p>
    <div class="result-cards">
      <div class="rcard" style="border-color:var(--gold)"><div class="top" style="background:var(--gold)">মোট XP</div><div class="val" style="color:var(--gold)">⚡${xp}</div></div>
      <div class="rcard" style="border-color:var(--blue)"><div class="top" style="background:var(--blue)">রত্ন</div><div class="val" style="color:var(--blue)">💎${gems}</div></div>
      <div class="rcard" style="border-color:var(--green)"><div class="top" style="background:var(--green)">সঠিকতা</div><div class="val" style="color:var(--green-d)">${Math.round((L.ex.length-L.wrong)/L.ex.length*100)}%</div></div>
    </div>
    <div id="result-extra"></div>
    <button class="btn" onclick="afterResult()">চালিয়ে যাও</button>
  </div>`;
  L.newBadges=newBadges;
  window.scrollTo(0,0);
}
function afterResult(){
  if(L.newBadges&&L.newBadges.length){
    const b=L.newBadges.shift();
    modal(`<div class="emo">${b.emo}</div><h2>নতুন অর্জন: ${b.nm}</h2><p>${b.desc}</p>`,`<button class="btn" onclick="closeModal();afterResult()">দারুণ!</button>`);
    return;
  }
  if(S.chestCount%3===0&&S.chestCount>0){
    S.chestCount++; // যেন বারবার না আসে
    const r=Math.random(),prize=r<.5?{e:"💎",t:"রত্ন",v:10+Math.floor(Math.random()*15)}:r<.8?{e:"⚡",t:"বোনাস XP",v:20+Math.floor(Math.random()*30)}:{e:"❤️",t:"হৃদয় রিফিল",v:0};
    if(prize.t==="রত্ন")S.gems+=prize.v;else if(prize.t==="বোনাস XP")S.xp+=prize.v;else S.hearts=5;
    save();updateTop();
    modal(`<div class="emo">🎁</div><h2>রহস্য সিন্দুক!</h2><p>তুমি পেলে: ${prize.e} ${prize.v||"সম্পূর্ণ"} ${prize.t}!</p>`,`<button class="btn" onclick="closeModal();showTab('home')">আলহামদুলিল্লাহ!</button>`);
    return;
  }
  showTab("home");
}
/* ════════ WORDS ════════ */
function renderWords(){
  const list=$("#word-list"),ws=Object.entries(S.words);
  if(!ws.length){list.innerHTML=`<div style="text-align:center;padding:40px 0;color:var(--gray);font-weight:700">এখনো কোনো শব্দ শেখোনি।<br>প্রথম পাঠ শুরু করো! 🌱</div>`;return}
  list.innerHTML=`<button class="btn blue" style="margin-bottom:14px" onclick="startReview()">🔁 শব্দ অনুশীলন করো (${ws.length}টি শব্দ)</button>`
   +ws.map(([a,b])=>`<div class="word-row"><span class="ar">${a}</span><span class="bn">${b}</span><button onclick="speak('${a}')">🔊</button></div>`).join("");
}
/* ════════ LEAGUE ════════ */
function renderLeague(){
  if(!S.rivalXP){S.rivalXP=RIVALS.map(()=>Math.floor(Math.random()*400)+30);save()}
  const rows=RIVALS.map((n,i)=>({n,xp:S.rivalXP[i],me:false}));
  rows.push({n:"তুমি",xp:S.xp,me:true});
  rows.sort((a,b)=>b.xp-a.xp);
  $("#lb-list").innerHTML=rows.map((r,i)=>`<div class="lb-row ${r.me?"me":""}">
    <span class="rank">${i+1}</span><span>${i===0?"🥇":i===1?"🥈":i===2?"🥉":"🔹"}</span>
    <span>${r.n}</span><span class="xps">⚡${r.xp} XP</span></div>`).join("")
    +`<p style="color:var(--gray);font-size:12.5px;font-weight:600;margin-top:12px;text-align:center">* এটি অনুশীলনের জন্য একটি ডেমো লিগ — প্রতিদ্বন্দ্বীরা কাল্পনিক।</p>`;
}
/* ════════ PROFILE ════════ */
function renderProfile(){
  const lvl=Math.min(LEVELS.length-1,Math.floor(S.xp/150));
  $("#pf-av").textContent=LEVELS[lvl].e;$("#pf-title").textContent=LEVELS[lvl].t;
  $("#pf-sub").textContent=`লেভেল ${lvl+1} · পরের লেভেলে ${150-(S.xp%150)} XP বাকি`;
  $("#pf-xp").textContent=S.xp;$("#pf-streak").textContent=S.streak+" 🔥";
  $("#pf-crowns").textContent=totalCrowns(S)+"/"+(UNITS.length*3);$("#pf-words").textContent=Object.keys(S.words).length;
  $("#badge-grid").innerHTML=BADGES.map(b=>`<div class="badge ${S.badges[b.id]?"":"off"}"><div class="emo">${b.emo}</div><div class="nm">${b.nm}</div><div style="font-size:10.5px;color:var(--gray);font-weight:600">${b.desc}</div></div>`).join("");
}
function resetAll(){if(confirm("সত্যিই সব প্রগ্রেস মুছে ফেলবে?")){localStorage.removeItem("eas_state");location.reload()}}
/* ════════ INIT ════════ */
dailyRefresh();updateTop();renderPath();
if(localStorage.getItem("eas_welcome")&&!localStorage.getItem("eas_v2")){
  localStorage.setItem("eas_v2","1");
  modal(`<div class="emo">🎊</div><h2>বিশাল আপডেট!</h2>
  <p>এখন <b>সম্পূর্ণ কিতাব</b> — ৩৬টি পাঠ, ৪টি অধ্যায়!<br><br>
  🌿 নতুন ৫০০+ শব্দ ও বাক্য<br>
  🌳 ক্রিয়া: অতীত-বর্তমান-আদেশ-বাব<br>
  🕌 বহুবচন, সংখ্যা, কুরআন-হাদীস<br>
  ❓ নতুন অনুশীলন: প্রশ্নোত্তর, শূন্যস্থান, অর্থ বাছাই<br>
  🎯 দৈনিক লক্ষ্য ও 🔁 শব্দ অনুশীলন</p>`,
  `<button class="btn" onclick="closeModal()">আলহামদুলিল্লাহ — চালিয়ে যাই!</button>`);
}
if(!localStorage.getItem("eas_welcome")){
  localStorage.setItem("eas_welcome","1");localStorage.setItem("eas_v2","1");
  modal(`<div class="emo">📕</div><h2>এসো আরবি শিখি!</h2>
  <p>মাওলানা আবু তাহের মিসবাহ্‌র প্রিয় কিতাবটি এবার খেলার ছলে!<br><br>
  ✅ প্রতিদিন খেলে <b>🔥 ধারা</b> ধরে রাখো<br>
  ✅ সঠিক উত্তরে <b>⚡XP</b> ও <b>💎 রত্ন</b> জেতো<br>
  ✅ ভুল হলে <b>❤️ হৃদয়</b> কমবে — সাবধান!<br>
  ✅ প্রতিটি পাঠে <b>👑 মুকুট</b> জিতে পরের পাঠ খোলো</p>`,
  `<button class="btn" onclick="closeModal()">বিসমিল্লাহ — শুরু করি!</button>`);
}
</script>
